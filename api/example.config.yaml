# Full example — copy to api/config.yaml and edit. Do not commit real secrets.

sentinel:
  database_url: "sqlite:///sentinel.db"
  host: "0.0.0.0"
  port: 8400
  log_level: "INFO"
  log_file: "/var/log/sentinel/api.log"

auth:
  tokens: []

notifications:
  smtp:
    enabled: true
    host: "smtp.gmail.com"
    port: 587
    use_tls: true
    username: "your-email@example.com"
    password: "your-app-password"
    from_address: "notifications@example.com"
    from_name: "Craft and Logic"

  sendgrid:
    enabled: false
    api_key: ""
    from_address: ""
    from_name: "CXL Sentinel"

  branding:
    logo_url: ""
    accent_color: "#2563eb"
    header_theme: "dark"
    header_background: ""
    company_name: ""
    footer_text: ""

  rules:
    - server_id: "*"
      server_alias: ""
      environments: ["production", "staging"]
      send_schedule: "6h"         # digest cadence: 10m, 6h, 1d, 7d
      recipients:
        - "ops@example.com"
